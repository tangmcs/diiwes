# Locked one-seed Hopper comparison from a shared policy-gradient checkpoint.
env_name: Hopper-v5

population_size: 2000
learning_rate: 0.16
lr_schedule: constant
noise_std: 0.02
l2_coeff: 0.0
rank_fitness: true
antithetic: true

hidden_dims: [64, 64]
activation: tanh
output_activation: tanh
init_param_std: 0.1

n_iterations: 300
eval_episodes: 10
eval_interval: 1
log_interval: 10
max_episode_steps: 1000
use_obs_norm: true

# Fresh-only comparison isolates diagonal curvature from replay.
buffer_size: 0
reuse_fraction: 0.0
buffer_sampling: random
min_importance_weight: 0.001
max_importance_weight: 10.0
max_sample_age: 3
ess_min_ratio: 0.2

common_rollout_seed: true

# No geometry-free damping, trust clipping, center evaluation, or EMA.
implicit_damping: 0.0
use_curvature: true
curvature_fitness: raw
curvature_mode: diag
curvature_step_mode: dampen
curvature_beta: 0.0
curvature_clip: 1000.0
min_step_multiplier: 0.05
trust_radius: null
evaluate_center_fitness: false
use_leave_one_out_curvature_baseline: true
bias_correct_curvature_ema: false
