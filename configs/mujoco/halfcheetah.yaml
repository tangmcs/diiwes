# HalfCheetah-v5 configuration for DIIWES robustness checks.
#
# The CLI condition selects the optimizer variant:
#   standard_es      -> plain ES baseline without trust-radius clipping
#   no_curvature     -> DIIWES replay/implicit/trust step without curvature
#   diag_curvature   -> DIIWES with diagonal curvature and trust-radius clipping

env_name: HalfCheetah-v5

population_size: 200
learning_rate: 0.16
noise_std: 0.02
l2_coeff: 0.0
rank_fitness: true
antithetic: true

hidden_dims: [64, 64]
activation: tanh
output_activation: tanh
init_param_std: 0.1

n_iterations: 500
eval_episodes: 3
eval_interval: 1
log_interval: 10
max_episode_steps: 1000
use_obs_norm: true

buffer_size: 1024
reuse_fraction: 0.2
buffer_sampling: random
min_importance_weight: 0.001
max_importance_weight: 10.0
max_sample_age: 3
ess_min_ratio: 0.2

common_rollout_seed: true

implicit_damping: 0.1
use_curvature: true
curvature_mode: diag
curvature_beta: 0.99
curvature_clip: 1000.0
min_step_multiplier: 0.05
trust_radius: 1.0
evaluate_center_fitness: false
use_leave_one_out_curvature_baseline: true
bias_correct_curvature_ema: true
