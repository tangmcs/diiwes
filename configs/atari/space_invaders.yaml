# SpaceInvaders Atari RAM configuration for DIIWES robustness checks.

env_name: ALE/SpaceInvaders-v5
env_kwargs:
  obs_type: ram
  frameskip: 4
  repeat_action_probability: 0.0
fire_reset: true
fire_reset_steps: [1]
fire_on_life_loss: true
frame_stack: 4
action_indices: [1, 4, 5]

population_size: 200
learning_rate: 0.02
noise_std: 0.03
l2_coeff: 0.0
rank_fitness: false
antithetic: true

hidden_dims: [64, 64]
activation: tanh
output_activation: null
init_param_std: 0.05

n_iterations: 1500
eval_episodes: 3
eval_interval: 1
log_interval: 25
max_episode_steps: 10000
use_obs_norm: true
obs_scale: 1.0

buffer_size: 1024
reuse_fraction: 0.2
buffer_sampling: random
min_importance_weight: 0.001
max_importance_weight: 10.0
max_sample_age: 3
ess_min_ratio: 0.2

common_rollout_seed: false

implicit_damping: 0.1
use_curvature: true
curvature_mode: diag
curvature_beta: 0.99
curvature_clip: 1000.0
min_step_multiplier: 0.05
trust_radius: 1.0
evaluate_center_fitness: false
use_leave_one_out_curvature_baseline: true
bias_correct_curvature_ema: true
