# Freeway Atari RAM configuration for general ES diagnostics.

env_name: ALE/Freeway-v5
env_kwargs:
  obs_type: ram
  frameskip: 4
  repeat_action_probability: 0.0
action_indices: [0, 1, 2]

population_size: 200
learning_rate: 0.02
noise_std: 0.02
l2_coeff: 0.0
rank_fitness: true
antithetic: true

hidden_dims: [64, 64]
activation: tanh
output_activation: null
init_param_std: 0.05

n_iterations: 500
eval_episodes: 3
eval_interval: 1
log_interval: 25
max_episode_steps: 3000
use_obs_norm: true
obs_norm_mode: frozen_after_calibration
obs_norm_calibration_episodes: 3
obs_scale: 1.0

# Replay is disabled while the update mechanisms are isolated.
replay_enabled: false
buffer_size: 0
reuse_fraction: 0.0
buffer_sampling: random
min_importance_weight: 0.001
max_importance_weight: 10.0
max_sample_age: 3
ess_min_ratio: 0.2
min_replay_weight_mass: 0.01

common_rollout_seed: false

scalar_damping: 0.1
use_curvature: true
curvature_fitness: raw
curvature_mode: diag
curvature_beta: 0.99
curvature_clip: 1000.0
evaluate_center_fitness: false
use_leave_one_out_curvature_baseline: true
bias_correct_curvature_ema: true
